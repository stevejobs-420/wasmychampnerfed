name: Ingest patch notes

on:
  schedule:
    # Patches drop ~every 2 weeks, usually Tuesday/Wednesday. Run twice a week
    # (Thu + Sun mornings UTC) — the page cache makes no-op runs nearly free.
    - cron: "0 6 * * 4,0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore page cache
        uses: actions/cache@v4
        with:
          path: .cache/pages
          key: patch-pages-${{ github.run_id }}
          restore-keys: patch-pages-

      - run: npm ci

      - run: npm run ingest:full

      - name: Commit updated dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: ingest latest patch notes"
            git push
          fi
